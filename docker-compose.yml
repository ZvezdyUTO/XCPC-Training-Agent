services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: aATAdb
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      OPENAI_API_KEY: <TOKEN>
      OPENAI_BASE_URL: <URL>
      LLM_MODEL: <MODEl>
      AGENT_TEST: ${AGENT_TEST:-1}
    ports:
      - "8888:8888"
    volumes:
      - .:/app
    depends_on:
      mysql:
        condition: service_healthy
    restart: always

  frontend:
    image: node:22-alpine
    working_dir: /app/frontend
    environment:
      VITE_API_PROXY_TARGET: http://app:8888
    command: sh -c "npm install && npm run dev"
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    depends_on:
      - app
    restart: always

volumes:
  mysql_data:
