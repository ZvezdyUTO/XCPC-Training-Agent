services:
  mysql:
    image: mysql:8.0
    container_name: aATA-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: aATAdb
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    environment:
      - MYSQL_ROOT_HOST=%
      - DASHSCOPE_API_KEY=c32d9498add44564acf845539e6ce70d.MM00Sp0diNBSk89D
      - DASHSCOPE_BASE_URL=https://open.bigmodel.cn/api/paas/v4/chat/completions
      - LLM_MODEL=glm-4.7
      - AGENT_TEST=1
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: aATA-app
    ports:
      - "8888:8888"
    volumes:
      - .:/app
    depends_on:
      mysql:
        condition: service_healthy

    restart: always

volumes:
  mysql_data:
