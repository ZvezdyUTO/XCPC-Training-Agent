services:
  mysql_test:
    image: mysql:8.0
    container_name: aata_mysql_test
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: aata_test
    ports:
      - "3307:3306"
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci

